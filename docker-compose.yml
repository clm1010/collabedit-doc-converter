services:
  unoserver:
    image: libreofficedocker/libreoffice-unoserver:3.22
    ports:
      - '2004:2004'
    shm_size: '1gb'
    environment:
      - S6_CMD_WAIT_FOR_SERVICES_MAXTIME=300000
    volumes:
      - ./fonts:/usr/share/fonts/custom:ro
    healthcheck:
      test: ['CMD-SHELL', 'curl -so /dev/null http://localhost:2004/ || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: always

  converter:
    build: .
    ports:
      - '${PORT:-3002}:${PORT:-3002}'
    environment:
      - UNOSERVER_URL=http://unoserver:2004
      - PORT=${PORT:-3002}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-50mb}
      - CONVERT_TIMEOUT=${CONVERT_TIMEOUT:-60000}
      - MAX_CONCURRENT=${MAX_CONCURRENT:-5}
      - IMPORT_TIMEOUT=${IMPORT_TIMEOUT:-30000}
      - EXPORT_TIMEOUT=${EXPORT_TIMEOUT:-120000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      unoserver:
        condition: service_healthy
    restart: always
